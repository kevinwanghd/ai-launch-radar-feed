name: Generate AI Launch Radar Feed

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate feed
        env:
          GITHUB_TOKEN: ${{ secrets.AI_LAUNCH_RADAR_GH_TOKEN }}
          PRODUCT_HUNT_SESSION: ${{ secrets.PRODUCT_HUNT_SESSION }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
        run: npm run generate

      - name: Commit and push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update ai launch radar feed [skip ci]"
          git push
